<svg viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg" width="900" height="420">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#CC3300"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="nodeBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f7f7f7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="420" fill="#0f0f0f" rx="12"/>
  <rect width="900" height="420" fill="url(#gridpat)" opacity="0.03"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" fill="#CC3300" font-family="monospace" font-size="13" font-weight="bold" letter-spacing="3">AI LEAD MANAGEMENT PIPELINE</text>

  <!-- ── NODES ── -->

  <!-- 1. Form -->
  <g transform="translate(30, 160)">
    <rect width="110" height="80" rx="8" fill="#1a1a1a" stroke="#CC3300" stroke-width="1.5"/>
    <rect width="110" height="6" rx="3" fill="#CC3300" y="0"/>
    <text x="55" y="30" text-anchor="middle" fill="#CC3300" font-family="monospace" font-size="9" font-weight="bold">FORM TRIGGER</text>
    <text x="55" y="46" text-anchor="middle" fill="#888" font-family="monospace" font-size="8">n8n</text>
    <rect x="15" y="54" width="80" height="6" rx="3" fill="#222"/>
    <rect x="15" y="64" width="55" height="6" rx="3" fill="#222"/>
    <animateTransform attributeName="transform" type="translate" values="30,160; 30,156; 30,160" dur="3s" repeatCount="indefinite"/>
  </g>

  <!-- pulse ring on form -->
  <circle cx="85" cy="200" r="44" fill="none" stroke="#CC3300" stroke-width="1" opacity="0">
    <animate attributeName="r" values="44;62;44" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0;0.6" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Arrow 1→2 -->
  <line x1="142" y1="200" x2="188" y2="200" stroke="#CC3300" stroke-width="1.5" marker-end="url(#arrow)"/>
  <circle cx="158" cy="200" r="3" fill="#CC3300">
    <animate attributeName="cx" values="142;186" dur="1.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0" dur="1.2s" repeatCount="indefinite"/>
  </circle>

  <!-- 2. AI -->
  <g transform="translate(190, 155)">
    <rect width="115" height="90" rx="8" fill="#1a1a1a" stroke="#7c3aed" stroke-width="1.5"/>
    <rect width="115" height="6" rx="3" fill="#7c3aed" y="0"/>
    <text x="57" y="28" text-anchor="middle" fill="#a78bfa" font-family="monospace" font-size="9" font-weight="bold">AI CLASSIFIER</text>
    <text x="57" y="42" text-anchor="middle" fill="#888" font-family="monospace" font-size="8">Ollama / LLaMA 3</text>
    <text x="57" y="58" text-anchor="middle" fill="#555" font-family="monospace" font-size="7">Beginner / Advanced</text>
    <text x="57" y="70" text-anchor="middle" fill="#555" font-family="monospace" font-size="7">Client / Kids / Custom</text>
    <animateTransform attributeName="transform" type="translate" values="190,155; 190,151; 190,155" dur="2.5s" repeatCount="indefinite"/>
  </g>

  <!-- brain pulse -->
  <circle cx="247" cy="200" r="48" fill="none" stroke="#7c3aed" stroke-width="1" opacity="0">
    <animate attributeName="r" values="48;66;48" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0;0.5" dur="2.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Arrow 2→3 -->
  <line x1="307" y1="200" x2="353" y2="200" stroke="#CC3300" stroke-width="1.5" marker-end="url(#arrow)"/>
  <circle cx="323" cy="200" r="3" fill="#CC3300">
    <animate attributeName="cx" values="307;351" dur="1.2s" begin="0.3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0" dur="1.2s" begin="0.3s" repeatCount="indefinite"/>
  </circle>

  <!-- 3. Sheets -->
  <g transform="translate(355, 160)">
    <rect width="110" height="80" rx="8" fill="#1a1a1a" stroke="#16a34a" stroke-width="1.5"/>
    <rect width="110" height="6" rx="3" fill="#16a34a" y="0"/>
    <text x="55" y="28" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="9" font-weight="bold">GOOGLE SHEETS</text>
    <text x="55" y="42" text-anchor="middle" fill="#888" font-family="monospace" font-size="8">Lead Logger</text>
    <rect x="12" y="52" width="86" height="5" rx="2" fill="#1e3a2a"/>
    <rect x="12" y="61" width="60" height="5" rx="2" fill="#1e3a2a"/>
    <rect x="12" y="70" width="74" height="5" rx="2" fill="#1e3a2a"/>
    <animateTransform attributeName="transform" type="translate" values="355,160; 355,156; 355,160" dur="4s" repeatCount="indefinite"/>
  </g>

  <!-- Arrow 3→4 -->
  <line x1="467" y1="200" x2="513" y2="200" stroke="#CC3300" stroke-width="1.5" marker-end="url(#arrow)"/>
  <circle cx="483" cy="200" r="3" fill="#CC3300">
    <animate attributeName="cx" values="467;511" dur="1.2s" begin="0.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0" dur="1.2s" begin="0.6s" repeatCount="indefinite"/>
  </circle>

  <!-- 4. Switch -->
  <g transform="translate(515, 155)">
    <rect width="110" height="90" rx="8" fill="#1a1a1a" stroke="#f59e0b" stroke-width="1.5"/>
    <rect width="110" height="6" rx="3" fill="#f59e0b" y="0"/>
    <text x="55" y="28" text-anchor="middle" fill="#fcd34d" font-family="monospace" font-size="9" font-weight="bold">SWITCH ROUTER</text>
    <text x="55" y="42" text-anchor="middle" fill="#888" font-family="monospace" font-size="8">5 Routes</text>
    <!-- branches indicator -->
    <line x1="55" y1="52" x2="20" y2="80" stroke="#f59e0b" stroke-width="1" opacity="0.5"/>
    <line x1="55" y1="52" x2="38" y2="80" stroke="#f59e0b" stroke-width="1" opacity="0.5"/>
    <line x1="55" y1="52" x2="55" y2="80" stroke="#f59e0b" stroke-width="1" opacity="0.5"/>
    <line x1="55" y1="52" x2="72" y2="80" stroke="#f59e0b" stroke-width="1" opacity="0.5"/>
    <line x1="55" y1="52" x2="90" y2="80" stroke="#f59e0b" stroke-width="1" opacity="0.5"/>
    <animateTransform attributeName="transform" type="translate" values="515,155; 515,151; 515,155" dur="3.5s" repeatCount="indefinite"/>
  </g>

  <!-- Arrows from switch to emails (fan out) -->
  <!-- to email 1 top -->
  <path d="M625,175 Q680,175 680,80" fill="none" stroke="#CC3300" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <path d="M625,185 Q685,185 685,135" fill="none" stroke="#CC3300" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="625" y1="200" x2="690" y2="200" stroke="#CC3300" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <path d="M625,215 Q685,215 685,265" fill="none" stroke="#CC3300" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <path d="M625,225 Q680,225 680,320" fill="none" stroke="#CC3300" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- Email nodes -->
  <!-- Beginner -->
  <g transform="translate(692, 45)">
    <rect width="130" height="42" rx="6" fill="#1a1a1a" stroke="#CC3300" stroke-width="1"/>
    <text x="65" y="15" text-anchor="middle" fill="#CC3300" font-family="monospace" font-size="8" font-weight="bold">BEGINNER EMAIL</text>
    <text x="65" y="29" text-anchor="middle" fill="#555" font-family="monospace" font-size="7">MIG / STICK Students</text>
  </g>

  <!-- Advanced -->
  <g transform="translate(692, 100)">
    <rect width="130" height="42" rx="6" fill="#1a1a1a" stroke="#CC3300" stroke-width="1"/>
    <text x="65" y="15" text-anchor="middle" fill="#CC3300" font-family="monospace" font-size="8" font-weight="bold">ADVANCED EMAIL</text>
    <text x="65" y="29" text-anchor="middle" fill="#555" font-family="monospace" font-size="7">TIG Students</text>
  </g>

  <!-- Client -->
  <g transform="translate(692, 178)">
    <rect width="130" height="42" rx="6" fill="#1a1a1a" stroke="#CC3300" stroke-width="1"/>
    <text x="65" y="15" text-anchor="middle" fill="#CC3300" font-family="monospace" font-size="8" font-weight="bold">CLIENT EMAIL</text>
    <text x="65" y="29" text-anchor="middle" fill="#555" font-family="monospace" font-size="7">Local Welding Work</text>
  </g>

  <!-- Kids -->
  <g transform="translate(692, 233)">
    <rect width="130" height="42" rx="6" fill="#1a1a1a" stroke="#CC3300" stroke-width="1"/>
    <text x="65" y="15" text-anchor="middle" fill="#CC3300" font-family="monospace" font-size="8" font-weight="bold">KIDS EMAIL</text>
    <text x="65" y="29" text-anchor="middle" fill="#555" font-family="monospace" font-size="7">Workshop Parents</text>
  </g>

  <!-- Custom -->
  <g transform="translate(692, 288)">
    <rect width="130" height="42" rx="6" fill="#1a1a1a" stroke="#CC3300" stroke-width="1"/>
    <text x="65" y="15" text-anchor="middle" fill="#CC3300" font-family="monospace" font-size="8" font-weight="bold">CUSTOM EMAIL</text>
    <text x="65" y="29" text-anchor="middle" fill="#555" font-family="monospace" font-size="7">General Inquiries</text>
  </g>

  <!-- Pushover node below sheets -->
  <g transform="translate(355, 270)">
    <rect width="110" height="60" rx="8" fill="#1a1a1a" stroke="#0ea5e9" stroke-width="1.5"/>
    <rect width="110" height="6" rx="3" fill="#0ea5e9" y="0"/>
    <text x="55" y="26" text-anchor="middle" fill="#38bdf8" font-family="monospace" font-size="9" font-weight="bold">PUSHOVER</text>
    <text x="55" y="40" text-anchor="middle" fill="#888" font-family="monospace" font-size="8">Owner Alert</text>
    <text x="55" y="52" text-anchor="middle" fill="#555" font-family="monospace" font-size="7">Instant Push Notification</text>
  </g>
  <!-- Arrow sheets→pushover -->
  <line x1="410" y1="242" x2="410" y2="268" stroke="#0ea5e9" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- Cloudflare badge -->
  <g transform="translate(30, 290)">
    <rect width="150" height="50" rx="8" fill="#1a1a1a" stroke="#f97316" stroke-width="1.5"/>
    <text x="75" y="20" text-anchor="middle" fill="#fb923c" font-family="monospace" font-size="9" font-weight="bold">CLOUDFLARE TUNNEL</text>
    <text x="75" y="34" text-anchor="middle" fill="#888" font-family="monospace" font-size="8">HTTPS Encrypted</text>
    <text x="75" y="46" text-anchor="middle" fill="#555" font-family="monospace" font-size="7">Zero Exposed Ports</text>
  </g>
  <!-- connecting line from cloudflare to form -->
  <path d="M105,290 Q105,260 85,242" fill="none" stroke="#f97316" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- scanline animation -->
  <rect x="30" y="160" width="3" height="4" fill="#CC3300" opacity="0.8">
    <animate attributeName="x" values="30;860;30" dur="4s" repeatCount="indefinite" calcMode="linear"/>
    <animate attributeName="opacity" values="0.8;0;0.8" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- bottom label -->
  <text x="450" y="400" text-anchor="middle" fill="#333" font-family="monospace" font-size="9">Built with n8n · Ollama · Google Sheets · Cloudflare · Pushover · Gmail SMTP</text>
</svg>
