<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0500"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="12"/>

  <!-- Grid dots -->
  <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1" fill="#CC3300" opacity="0.08"/>
  </pattern>
  <rect width="800" height="500" fill="url(#dots)"/>

  <!-- Browser chrome -->
  <rect x="60" y="30" width="680" height="440" rx="10" fill="#111" stroke="#2a2a2a" stroke-width="1"/>
  <!-- browser top bar -->
  <rect x="60" y="30" width="680" height="36" rx="10" fill="#1e1e1e"/>
  <rect x="60" y="54" width="680" height="12" fill="#1e1e1e"/>
  <!-- browser dots -->
  <circle cx="84" cy="48" r="5" fill="#ff5f57"/>
  <circle cx="100" cy="48" r="5" fill="#ffbd2e"/>
  <circle cx="116" cy="48" r="5" fill="#28c840"/>
  <!-- url bar -->
  <rect x="140" y="40" width="460" height="16" rx="8" fill="#2a2a2a"/>
  <text x="370" y="52" text-anchor="middle" fill="#666" font-family="monospace" font-size="8">🔒  leads.yourdomain.com/form/inquiry</text>

  <!-- Form card -->
  <rect x="240" y="75" width="320" height="378" rx="8" fill="white"/>

  <!-- Logo area -->
  <rect x="280" y="90" width="240" height="60" rx="6" fill="#1a1a1a"/>
  <text x="400" y="118" text-anchor="middle" fill="#CC3300" font-family="Arial" font-size="13" font-weight="bold">ELITE METAL WORKS</text>
  <text x="400" y="134" text-anchor="middle" fill="#888" font-family="Arial" font-size="8">Welding Training LLC · Bakersfield, CA</text>

  <!-- Form title -->
  <text x="400" y="172" text-anchor="middle" fill="#1a1a1a" font-family="Arial" font-size="11" font-weight="bold">Class Inquiry Form</text>

  <!-- Field: Student Name -->
  <text x="258" y="194" fill="#555" font-family="Arial" font-size="8">Student Name</text>
  <rect x="256" y="198" width="286" height="22" rx="4" fill="white" stroke="#ddd" stroke-width="1"/>
  <!-- typing animation -->
  <text x="262" y="213" fill="#333" font-family="Arial" font-size="9">
    <tspan>Alex Johnson</tspan>
  </text>
  <rect x="352" y="202" width="1" height="14" fill="#333">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- Field: Phone -->
  <text x="258" y="234" fill="#555" font-family="Arial" font-size="8">Phone Number</text>
  <rect x="256" y="238" width="286" height="22" rx="4" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="262" y="253" fill="#333" font-family="Arial" font-size="9">(661) 555-0192</text>

  <!-- Field: Interested Class dropdown -->
  <text x="258" y="274" fill="#555" font-family="Arial" font-size="8">Interested Class</text>
  <rect x="256" y="278" width="286" height="22" rx="4" fill="white" stroke="#CC3300" stroke-width="1.5"/>
  <text x="262" y="293" fill="#CC3300" font-family="Arial" font-size="9" font-weight="bold">TIG Welding</text>
  <text x="530" y="293" fill="#CC3300" font-family="Arial" font-size="10">▾</text>

  <!-- Field: Email -->
  <text x="258" y="314" fill="#555" font-family="Arial" font-size="8">Email Address *</text>
  <rect x="256" y="318" width="286" height="22" rx="4" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="262" y="333" fill="#333" font-family="Arial" font-size="9">alex@email.com</text>

  <!-- Field: Message -->
  <text x="258" y="354" fill="#555" font-family="Arial" font-size="8">Tell us about your project or ask a question</text>
  <rect x="256" y="358" width="286" height="48" rx="4" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="262" y="371" fill="#333" font-family="Arial" font-size="8">I'm interested in learning TIG welding.</text>
  <text x="262" y="383" fill="#333" font-family="Arial" font-size="8">I have some basic experience and want</text>
  <text x="262" y="395" fill="#333" font-family="Arial" font-size="8">to improve my technique.</text>

  <!-- Submit button -->
  <rect x="256" y="416" width="286" height="28" rx="5" fill="#CC3300">
    <animate attributeName="opacity" values="1;0.85;1" dur="2s" repeatCount="indefinite"/>
  </rect>
  <text x="399" y="434" text-anchor="middle" fill="white" font-family="Arial" font-size="10" font-weight="bold">Submit Inquiry</text>

  <!-- Floating notification badge (top right) -->
  <g transform="translate(590, 90)">
    <rect width="120" height="55" rx="8" fill="#1a1a1a" stroke="#0ea5e9" stroke-width="1"/>
    <text x="10" y="18" fill="#38bdf8" font-family="monospace" font-size="8" font-weight="bold">📱 NEW LEAD</text>
    <text x="10" y="32" fill="#888" font-family="monospace" font-size="7">Alex Johnson</text>
    <text x="10" y="44" fill="#555" font-family="monospace" font-size="7">TIG · Advanced</text>
    <animate attributeName="opacity" values="0;1;1;1;0" dur="4s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="590,110; 590,90; 590,90; 590,90; 590,110" dur="4s" repeatCount="indefinite"/>
  </g>

  <!-- AI badge bottom left -->
  <g transform="translate(90, 350)">
    <rect width="120" height="65" rx="8" fill="#1a1a1a" stroke="#7c3aed" stroke-width="1"/>
    <text x="10" y="18" fill="#a78bfa" font-family="monospace" font-size="8" font-weight="bold">🤖 AI RESPONSE</text>
    <text x="10" y="32" fill="#888" font-family="monospace" font-size="7">Category:</text>
    <text x="10" y="44" fill="#CC3300" font-family="monospace" font-size="8" font-weight="bold">Advanced (TIG)</text>
    <text x="10" y="58" fill="#555" font-family="monospace" font-size="7">Generating reply...</text>
    <animate attributeName="opacity" values="0;0;1;1;0" dur="4s" repeatCount="indefinite"/>
  </g>

  <!-- bottom label -->
  <text x="400" y="490" text-anchor="middle" fill="#333" font-family="monospace" font-size="9">Branded Lead Capture Form · Secured via Cloudflare Tunnel · HTTPS</text>
</svg>
